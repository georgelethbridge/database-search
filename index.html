<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EP Territory Search</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1>EP Territory Search</h1>
          <div class="sub">Generate fast register links for territories</div>
        </div>
      </div>
      <div class="header-right">
        <div class="badge">Tip <span class="kbd">?DEEP1234567</span></div>
      </div>
    </div>

    <div class="layout">
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-title">Search</div>
            <div class="card-hint">Enter an EP publication or application number, then generate links.</div>
          </div>
        </div>
        <div class="card-body">
          <div class="form">
            <div class="row">
              <div class="field">
                <label for="epPublicationNumber">EP Publication or Application Number</label>
                <input type="text" id="epPublicationNumber" placeholder="EP1234567 or EP18752904.5" autocomplete="off" />
              </div>
              <button class="btn" id="btnGenerateAll" type="button">Generate all</button>
            </div>

            <div class="row">
              <div class="field">
                <label for="territoryCode">Territory Code</label>
                <input type="text" id="territoryCode" placeholder="DE" autocomplete="off" />
              </div>
              <button class="btn secondary" id="btnGenerateOne" type="button">Generate one</button>
            </div>

            <div class="row">
              <div class="field full">
                <label for="resolvedPublicationNumber">Resolved EP Publication Number</label>
                <input type="text" id="resolvedPublicationNumber" readonly placeholder="Will load from EPO…" />
              </div>
            </div>

            <div class="row">
              <div class="field full">
                <label for="importedApplicationNumber">Resolved EP Application Number</label>
                <input type="text" id="importedApplicationNumber" readonly placeholder="Will load from EPO…" />
              </div>
            </div>

            <div class="row">
              <div class="note">
                <label>
                  <input type="checkbox" id="autoOpenToggle" />
                  Auto-open the generated link (single territory only)
                </label>
              </div>
            </div>

            <div class="alert" id="alertsContainer" role="alert">
              <strong id="alertsTitle">An error occurred</strong>
              <div id="alertsSection"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="card results" id="resultsCard">
        <div class="card-header">
          <div>
            <div class="card-title">Results</div>
            <div class="card-hint">Click a territory to open. Use the copy icon to copy the link.</div>
          </div>
          <button class="btn secondary icon" id="btnClear" type="button" title="Clear results">Clear</button>
        </div>
        <div class="card-body">
          <div class="links-grid" id="linksGrid"></div>

          <div style="height:12px;"></div>

          <details id="noLinksDetails" style="display:none;">
            <summary class="note">Territories with no link</summary>
            <div id="noLinksContainer" style="margin-top:10px;"></div>
          </details>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./app-logic.js?v=2026-04-08"></script>
  <script>
    // ---------------------------
    // Supabase configuration
    // ---------------------------
    const SUPABASE_URL = "https://xgbdcwxlpzjggxobcqfr.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_dr_BwE5yA1hXAI7WBO3-wA_yqD_bZmm";
    const BACKEND_URL = "https://api-ipb9.onrender.com/epo";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // UI elements
    const alertsContainer = document.getElementById("alertsContainer");
    const alertsSection = document.getElementById("alertsSection");
    const alertsTitle = document.getElementById("alertsTitle");

    const linksGrid = document.getElementById("linksGrid");
    const resultsCard = document.getElementById("resultsCard");
    const noLinksContainer = document.getElementById("noLinksContainer");
    const noLinksDetails = document.getElementById("noLinksDetails");

    const resolvedPublicationNumber = document.getElementById("resolvedPublicationNumber");
    const importedApplicationNumber = document.getElementById("importedApplicationNumber");
    const epPublicationNumber = document.getElementById("epPublicationNumber");
    const territoryCodeInput = document.getElementById("territoryCode");
    const autoOpenToggle = document.getElementById("autoOpenToggle");

    const btnGenerateAll = document.getElementById("btnGenerateAll");
    const btnGenerateOne = document.getElementById("btnGenerateOne");
    const btnClear = document.getElementById("btnClear");

    const toast = document.getElementById("toast");

    // Data
    let territoryLinks = {};
    let resolvedNumbers = { publicationNumber: "", applicationNumber: "", inputType: "" };
    let autoRedirectOnQuery = false; // true when URL is like ?DEEP1234567

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1400);
    }

    function showError(title, html) {
      alertsTitle.textContent = title || "An error occurred";
      alertsSection.innerHTML = html || "";
      alertsContainer.classList.add("show");
    }

    function clearError() {
      alertsContainer.classList.remove("show");
      alertsSection.innerHTML = "";
    }

    function clearResults() {
      linksGrid.innerHTML = "";
      noLinksContainer.innerHTML = "";
      noLinksDetails.style.display = "none";
      resultsCard.classList.remove("show");
      resolvedPublicationNumber.value = "";
      importedApplicationNumber.value = "";
      resolvedNumbers = { publicationNumber: "", applicationNumber: "", inputType: "" };
      clearError();
    }

    function getQueryParameter() {
      const regex = /\?(.+)/;
      const results = regex.exec(location.search);
      return results === null ? null : decodeURIComponent(results[1].replace(/\+/g, " "));
    }

    function prefillInputBoxes() {
      const rawQuery = getQueryParameter();
      if (rawQuery === null) return;

      const query = rawQuery.toUpperCase();
      const territoryCode = query.substring(0, 2);

      if (territoryCode in territoryLinks) {
        if (query.substring(2, 4) === "EP") {
          autoRedirectOnQuery = true;
          territoryCodeInput.value = territoryCode;
          epPublicationNumber.value = query.substring(2);
          generateSpecificLink();
        } else {
          autoRedirectOnQuery = false;
          territoryCodeInput.value = "";
          epPublicationNumber.value = query.substring();
          generateLinks();
        }
      } else {
        showError("Invalid query", "Territory code not recognised: <strong>" + territoryCode + "</strong>");
      }
    }

    async function loadTerritoryLinksFromSupabase() {
      const { data, error } = await supabaseClient
        .from("territory_links")
        .select("territory_code, link, required_number, format");

      if (error) {
        console.error(error);
        return false;
      }

      territoryLinks = {};
      for (const row of data ?? []) {
        const code = (row.territory_code || "").toUpperCase().trim();
        if (!code) continue;

        territoryLinks[code] = {
          link: row.link ?? null,
          requiredNumber: row.required_number ?? null,
          format: row.format ?? null
        };
      }
      return true;
    }

    // Formatting helpers
    function EPXXXXXXXX_Y(applicationNumber) { return "EP" + applicationNumber; }
    function XXXXXXXX_Y(applicationNumber) { return applicationNumber; }
    function XXXXXXXXY(applicationNumber) { return applicationNumber.replace(".", ""); }
    function EPXXXXXXXX(applicationNumber) {
      const decimalIndex = applicationNumber.indexOf(".");
      const base = decimalIndex !== -1 ? applicationNumber.substring(0, decimalIndex) : applicationNumber;
      return "EP" + base;
    }
    function EXXXXXXXX(applicationNumber) {
      const decimalIndex = applicationNumber.indexOf(".");
      const base = decimalIndex !== -1 ? applicationNumber.substring(0, decimalIndex) : applicationNumber;
      return "E" + base;
    }
    function EXXXXXXXXY(applicationNumber) { return "E" + applicationNumber.replace(".", ""); }
    function XXXXXXX(publicationNumber) { return publicationNumber.substring(2); }
    function EPXXXXXXX(publicationNumber) { return publicationNumber; }

    function generateFormattedNumber(format, number) {
      const fn = window[format];
      return (typeof fn === "function") ? fn(number) : number;
    }

    function openLink(link) {
      window.open(link, "_blank", "noopener,noreferrer");
    }

    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast("Copied link");
      } catch (e) {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        showToast("Copied link");
      }
    }

    const COPY_SVG = `
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M8 7a3 3 0 0 1 3-3h7a3 3 0 0 1 3 3v7a3 3 0 0 1-3 3h-7a3 3 0 0 1-3-3V7Z" stroke="currentColor" stroke-width="1.6"/>
        <path d="M6 17a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    `;

    function addLinkTile(code, finalLink, isDisabled=false) {
      const tile = document.createElement("div");
      tile.className = "link-tile" + (isDisabled ? " disabled" : "");
      tile.innerHTML = `
        <div class="link-code">${code}</div>
        <div class="link-sub">${finalLink || "No link"}</div>
        ${isDisabled ? "" : `<div class="copy-btn" title="Copy link">${COPY_SVG}</div>`}
      `;

      if (!isDisabled) {
        tile.addEventListener("click", (e) => {
          const isCopy = e.target.closest(".copy-btn");
          if (isCopy) return;
          openLink(finalLink);
        });

        const copyBtn = tile.querySelector(".copy-btn");
        copyBtn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          copyToClipboard(finalLink);
        });
      }

      linksGrid.appendChild(tile);
    }

    const RESOLUTION_CACHE_PREFIX = "ep-lookup:";

    function normalizeLookupInput(value) {
      return (value || "").toUpperCase().trim().replace(/\s+/g, "");
    }

    function getCachedResolution(rawValue) {
      const normalized = normalizeLookupInput(rawValue);
      if (!normalized) return null;
      try {
        const json = localStorage.getItem(RESOLUTION_CACHE_PREFIX + normalized);
        return json ? JSON.parse(json) : null;
      } catch {
        return null;
      }
    }

    function setCachedResolution(rawValue, payload) {
      const normalized = normalizeLookupInput(rawValue);
      if (!normalized || !payload) return;
      try {
        localStorage.setItem(RESOLUTION_CACHE_PREFIX + normalized, JSON.stringify(payload));
      } catch {
        // Ignore cache failures
      }
    }

    async function resolvePatentNumbers(rawValue, signal) {
      const cached = getCachedResolution(rawValue);
      if (cached?.publicationNumber || cached?.applicationNumber) return cached;

      const url = `${BACKEND_URL}/resolve?number=${encodeURIComponent(rawValue || "")}`;
      const response = await fetch(url, { signal });
      const data = await response.json().catch(() => ({}));

      if (!response.ok) {
        throw new Error(data?.error || "Could not resolve EP number.");
      }

      setCachedResolution(rawValue, data);
      return data;
    }

    function setResolvedFields(payload) {
      resolvedNumbers = {
        publicationNumber: payload?.publicationNumber || "",
        applicationNumber: payload?.applicationNumber || "",
        inputType: payload?.inputType || ""
      };

      resolvedPublicationNumber.value = resolvedNumbers.publicationNumber || "Unavailable";
      importedApplicationNumber.value = resolvedNumbers.applicationNumber || "Unavailable";
    }

    function sharedResetUI() {
      clearResults();

      const normalized = normalizeLookupInput(epPublicationNumber.value);
      epPublicationNumber.value = normalized;

      if (!normalized) {
        showError("Missing number", "Enter an EP publication or application number first.");
        return false;
      }

      resultsCard.classList.add("show");
      return true;
    }

    function getFormattedNumberForTerritory(territory) {
      if (!territory) return "";

      const requiredNumber = territory.requiredNumber;
      const format = territory.format;

      let rawNumber = "";
      if (requiredNumber === "EP Publication Number") {
        rawNumber = resolvedNumbers.publicationNumber || "";
      } else if (requiredNumber === "EP Application Number") {
        rawNumber = resolvedNumbers.applicationNumber || "";
      }

      if (!rawNumber) return "";
      return format ? generateFormattedNumber(format, rawNumber) : rawNumber;
    }

    async function generateLinks() {
      if (!sharedResetUI()) return;

      try {
        const payload = await resolvePatentNumbers(epPublicationNumber.value);
        setResolvedFields(payload);

        const codes = Object.keys(territoryLinks).sort();
        const noLinks = [];

        if (!resolvedNumbers.publicationNumber && !resolvedNumbers.applicationNumber) {
          throw new Error("No EP publication or application number was resolved from EPO.");
        }

        for (const code of codes) {
          const territory = territoryLinks[code];
          const queryLink = territory.link;
          const formattedNumber = getFormattedNumberForTerritory(territory);

          let finalLink = queryLink;
          if (finalLink && formattedNumber) {
            finalLink = finalLink.replace("%s", encodeURIComponent(formattedNumber));
          }

          if (territory.requiredNumber === "EP Application Number" && !resolvedNumbers.applicationNumber) {
            addLinkTile(code, "Application number unavailable", true);
            continue;
          }

          if (territory.requiredNumber === "EP Publication Number" && !resolvedNumbers.publicationNumber) {
            addLinkTile(code, "Publication number unavailable", true);
            continue;
          }

          if (queryLink) {
            addLinkTile(code, finalLink, false);
          } else {
            noLinks.push(code);
          }
        }

        if (noLinks.length) {
          noLinksDetails.style.display = "block";
          noLinksContainer.innerHTML = noLinks.map(c => `<div class="note">${c}: No link configured</div>`).join("");
        }
      } catch (e) {
        console.error(e);
        showError("Lookup failed", e.message || "Could not resolve the EP number from EPO.");
      }
    }

    async function generateSpecificLink() {
      if (!sharedResetUI()) return;

      try {
        const code = (territoryCodeInput.value || "").toUpperCase().trim();
        const territory = territoryLinks[code];

        if (!territory) {
          showError("Invalid territory", "Territory code not recognised: <strong>" + code + "</strong>");
          importedApplicationNumber.value = "";
          resolvedPublicationNumber.value = "";
          return;
        }

        importedApplicationNumber.value = autoRedirectOnQuery ? "Loading…" : "Loading…";
        resolvedPublicationNumber.value = autoRedirectOnQuery ? "Loading…" : "Loading…";

        const controller = new AbortController();
        const redirectTimeoutId = setTimeout(() => controller.abort(), 20000);

        let payload;
        try {
          payload = await resolvePatentNumbers(epPublicationNumber.value, controller.signal);
        } finally {
          clearTimeout(redirectTimeoutId);
        }

        setResolvedFields(payload);

        const formattedNumber = getFormattedNumberForTerritory(territory);

        if (!formattedNumber) {
          const missingLabel = territory.requiredNumber === "EP Application Number"
            ? "Application number unavailable"
            : "Publication number unavailable";

          if (autoRedirectOnQuery) return;
          addLinkTile(code, missingLabel, true);
          return;
        }

        let finalLink = territory.link;
        if (finalLink && formattedNumber) {
          finalLink = finalLink.replace("%s", encodeURIComponent(formattedNumber));
        }

        if (!territory.link) {
          addLinkTile(code, "No link configured", true);
          return;
        }

        if (autoRedirectOnQuery) {
          window.location.replace(finalLink);
          return;
        }

        addLinkTile(code, finalLink, false);
        if (autoOpenToggle.checked) openLink(finalLink);
      } catch (e) {
        console.error(e);

        if (autoRedirectOnQuery) {
          showError("Lookup failed", e.message || "Could not resolve the EP number from EPO.");
          return;
        }

        showError("Lookup failed", e.message || "Could not resolve the EP number from EPO.");
      }
    }

    btnGenerateAll.addEventListener("click", generateLinks);
    btnGenerateOne.addEventListener("click", generateSpecificLink);
    btnClear.addEventListener("click", () => {
      epPublicationNumber.value = "";
      territoryCodeInput.value = "";
      autoRedirectOnQuery = false;
      clearResults();
    });

    window.addEventListener("DOMContentLoaded", async () => {
      const ok = await loadTerritoryLinksFromSupabase();
      if (!ok) {
        showError("Could not load data", "Failed to load territory configuration from Supabase.");
        return;
      }
      prefillInputBoxes();
    });
</script>
</body>
</html>
